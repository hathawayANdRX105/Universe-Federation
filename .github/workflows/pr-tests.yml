name: PR tests

# The package jobs provide fast, isolated feedback. The integration jobs
# exercise a real browser session, backend API suite, two federating instances,
# and the production image; keep them separate so one failure does not hide another.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm run build-assets
      - run: pnpm run eslint

  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: ci
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 6379:6379
    env:
      MK_CONFIG_DB_HOST: 127.0.0.1
      MK_CONFIG_REDIS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORPUBSUB_HOST: 127.0.0.1
      MK_CONFIG_REDISFORJOBQUEUE_HOST: 127.0.0.1
      MK_CONFIG_REDISFORTIMELINES_HOST: 127.0.0.1
      MK_CONFIG_REDISFORREACTIONS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORRATELIMIT_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - name: Configure test instance
        run: |
          cp .config/ci.yml .config/default.yml
          cp .config/ci.yml .config/test.yml
      - run: pnpm --filter backend build:pre
      - run: pnpm --filter backend build
      - run: pnpm --filter backend migrate
      - run: pnpm --filter backend test

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm --filter frontend build:pre
      - run: pnpm --filter frontend build
      - run: pnpm --filter frontend test

  misskey-js:
    name: misskey-js tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm --filter misskey-js build
      - run: pnpm --filter misskey-js test

  megalodon:
    name: Megalodon tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm --filter megalodon build
      - run: pnpm --filter megalodon test

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm --filter backend typecheck

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm --filter frontend typecheck

  browser-e2e:
    name: Browser end-to-end tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: misskey
        options: >-
          --health-cmd "pg_isready -U postgres -d misskey"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 6379:6379
    env:
      MK_CONFIG_DB_HOST: 127.0.0.1
      MK_CONFIG_REDIS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORPUBSUB_HOST: 127.0.0.1
      MK_CONFIG_REDISFORJOBQUEUE_HOST: 127.0.0.1
      MK_CONFIG_REDISFORTIMELINES_HOST: 127.0.0.1
      MK_CONFIG_REDISFORREACTIONS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORRATELIMIT_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - name: Configure browser test instance
        run: |
          cp .config/cypress-devcontainer.yml .config/default.yml
          cp .config/cypress-devcontainer.yml .config/test.yml
          sed -i -e 's|url: http://misskey.local|url: http://localhost:61812|' -e 's|host: db|host: 127.0.0.1|' .config/default.yml .config/test.yml
          echo 'clusterLimit: 1' >> .config/test.yml
      - name: Install and verify Cypress browser
        run: pnpm cypress install && xvfb-run --auto-servernum pnpm cypress verify
      - name: Build and migrate test instance
        run: |
          pnpm build
          pnpm migrate
      - name: Start test server and run Cypress
        run: pnpm start-server-and-test start:test http://localhost:61812 cy:run
      - name: Upload Cypress diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: cypress-diagnostics
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore

  backend-api-e2e:
    name: Backend API integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test-misskey
        options: >-
          --health-cmd "pg_isready -U postgres -d test-misskey"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
        ports:
          - 6379:6379
    env:
      MK_CONFIG_DB_PASS: postgres
      MK_CONFIG_DB_HOST: 127.0.0.1
      MK_CONFIG_REDIS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORPUBSUB_HOST: 127.0.0.1
      MK_CONFIG_REDISFORJOBQUEUE_HOST: 127.0.0.1
      MK_CONFIG_REDISFORTIMELINES_HOST: 127.0.0.1
      MK_CONFIG_REDISFORREACTIONS_HOST: 127.0.0.1
      MK_CONFIG_REDISFORRATELIMIT_HOST: 127.0.0.1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - name: Configure backend API test instance
        run: |
          cp .config/test-example.yml .config/default.yml
          cp .config/test-example.yml .config/test.yml
          echo 'clusterLimit: 1' >> .config/test.yml
      - name: Build backend API test prerequisites
        run: pnpm --filter backend build:pre
      - name: Run backend API tests
        run: pnpm --filter backend test:e2e

  federation:
    name: Federation integration tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-ci
      - run: pnpm build
      - name: Create federation test certificates and config
        working-directory: packages/backend/test-federation
        run: bash ./setup.sh
      - name: Start federated instances
        working-directory: packages/backend/test-federation
        env:
          NODE_VERSION: '22'
        run: docker compose up --detach --wait --scale tester=0
      - name: Run federation suite
        working-directory: packages/backend/test-federation
        env:
          NODE_VERSION: '22'
        run: docker compose run --no-deps --rm tester
      - name: Collect federation diagnostics
        if: ${{ failure() }}
        working-directory: packages/backend/test-federation
        run: docker compose logs --no-color
      - name: Stop federated instances
        if: ${{ always() }}
        working-directory: packages/backend/test-federation
        run: docker compose down --volumes --remove-orphans

  container-smoke:
    name: Production container smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
      - name: Build production image
        run: DOCKER_BUILDKIT=1 docker build --tag universe-federation:${{ github.sha }} .
      - name: Start PostgreSQL and Redis
        run: |
          docker network create universe-federation-test
          docker run --detach --name universe-federation-postgres \
            --network universe-federation-test \
            --network-alias db \
            --env POSTGRES_DB=misskey \
            --env POSTGRES_USER=sharkey \
            --env POSTGRES_PASSWORD=ci \
            postgres:15-alpine
          docker run --detach --name universe-federation-redis \
            --network universe-federation-test \
            --network-alias redis \
            redis:7-alpine
      - name: Wait for dependencies
        run: |
          until docker exec universe-federation-postgres pg_isready -U sharkey -d misskey; do sleep 1; done
          until docker exec universe-federation-redis redis-cli ping; do sleep 1; done
      - name: Write container configuration
        run: |
          cat > "$RUNNER_TEMP/default.yml" <<'EOF'
          url: http://127.0.0.1:3000
          port: 3000
          address: 0.0.0.0
          db:
            host: db
            port: 5432
            db: misskey
            user: sharkey
            pass: ci
          redis:
            host: redis
            port: 6379
          EOF
          chmod 644 "$RUNNER_TEMP/default.yml"
      - name: Migrate and start production container
        run: |
          docker run --detach --name universe-federation-app \
            --network universe-federation-test \
            --publish 3000:3000 \
            --volume "$RUNNER_TEMP/default.yml:/sharkey/.config/default.yml:ro" \
            universe-federation:${{ github.sha }}
      - name: Verify health and public API
        run: |
          for _ in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:3000/healthz; then
              break
            fi
            sleep 2
          done
          curl --fail --silent --show-error http://127.0.0.1:3000/healthz
          curl --fail --silent --show-error \
            --header 'Content-Type: application/json' \
            --data '{"detail":false}' \
            http://127.0.0.1:3000/api/meta > "$RUNNER_TEMP/meta.json"
          python3 -c 'import json, sys; assert isinstance(json.load(open(sys.argv[1])), dict)' "$RUNNER_TEMP/meta.json"
      - name: Collect container diagnostics
        if: ${{ failure() }}
        run: |
          docker logs universe-federation-app || true
          docker logs universe-federation-postgres || true
          docker logs universe-federation-redis || true
      - name: Stop containers
        if: ${{ always() }}
        run: |
          docker rm --force universe-federation-app universe-federation-postgres universe-federation-redis 2>/dev/null || true
          docker network rm universe-federation-test 2>/dev/null || true

  pr-gate:
    name: PR test gate
    if: ${{ always() && !cancelled() }}
    needs:
      - lint
      - backend-unit
      - frontend-unit
      - misskey-js
      - megalodon
      - backend-typecheck
      - frontend-typecheck
      - browser-e2e
      - backend-api-e2e
      - federation
      - container-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every test job to pass
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          failed = {
              name: job['result']
              for name, job in json.loads(os.environ['NEEDS']).items()
              if job['result'] != 'success'
          }
          if failed:
              print(f'Failed or incomplete required jobs: {failed}')
              sys.exit(1)
          PY
