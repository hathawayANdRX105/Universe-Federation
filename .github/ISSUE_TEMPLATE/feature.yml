name: Feature
description: New capability or user-facing improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [agent/02-issue-guide.md](../../agent/02-issue-guide.md)

        Bugs → Bug template. Internal refactor/CI/docs → Task template.
        **Required** fields first. Extra fields: fill only when the field description says so.
        Published headings stay plain (no “(optional)” text in the Issue body).

        Quality bar: [omp#4815](https://github.com/can1357/oh-my-pi/issues/4815), [omp#4983](https://github.com/can1357/oh-my-pi/issues/4983).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should exist after this ships? Be concrete.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Problem / use case
      description: Who is blocked today? What workflow fails? Why existing levers are not enough (if any).
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Acceptance checklist a single PR can satisfy. Prefer observable outcomes.
      placeholder: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Extra fields (fill only when useful)
        Leave blank if not applicable. Do not write “(optional)” into the Issue body.

  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: |
        **Add when:** the idea can balloon (platform redesign, protocol change, multi-app).
        **Skip when:** scope is already tiny and obvious.
    validations:
      required: false

  - type: textarea
    id: proposed
    attributes:
      label: Proposed approach
      description: |
        **Add when:** you have a high-level shape (API flag, UI placement) that helps discussion.
        **Skip when:** you only know the user problem — maintainers can design.
        Not a full implementation plan unless asked.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        **Add when:** you tried workarounds or rejected designs and want that recorded.
        **Skip when:** none worth mentioning.
    validations:
      required: false

  - type: textarea
    id: area
    attributes:
      label: Area
      description: |
        **Add when:** a coarse module label helps routing (chat, timeline, federation, frontend, API, CI…).
        **Skip when:** title already makes area obvious.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        **Add when:** links, screenshots, prior art, related issues.
        **Skip when:** nothing else.
    validations:
      required: false
