name: Task / Refactor
description: Internal work — refactor, CI, docs, chore, active perf (one PR-sized unit)
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [agent/02-issue-guide.md](../../agent/02-issue-guide.md)

        User-facing **new capability** → Feature. **Broken behavior / regression** → Bug.
        Title prefixes: `refactor:` / `chore:` / `docs:` / `test:` / `perf:` (optimization, not a regression).
        You may add labels such as `docs` or `perf` after create if the default `chore` label is wrong — edit the issue.

        **Required** fields first. Extra fields: fill only when the field description says so.
        Published headings stay plain (no “(optional)” in the Issue body).

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should change in the codebase when this is done?
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Acceptance checklist a single PR can close.
      placeholder: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Extra fields (fill only when useful)
        Leave blank if not applicable. Do not write “(optional)” into the Issue body.

  - type: textarea
    id: background
    attributes:
      label: Background
      description: |
        **Add when:** context is not obvious (why now, link to a bug/incident).
        **Skip when:** Goal alone is enough.
    validations:
      required: false

  - type: textarea
    id: out
    attributes:
      label: Out of scope
      description: |
        **Add when:** the work could sprawl (rewrite whole subsystem, behavior change disguised as chore).
        **Skip when:** scope is already one tight change.
    validations:
      required: false

  - type: textarea
    id: observe
    attributes:
      label: How to observe success
      description: |
        **Add when:** title is `perf:` or success is not visible in a unit test alone (metric, log, bench, before/after).
        **Skip when:** Done when already implies a clear functional check.
    validations:
      required: false

  - type: textarea
    id: suspected
    attributes:
      label: Suspected areas
      description: |
        **Add when:** you know packages/files/symbols.
        **Skip when:** unknown — do not invent.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        **Add when:** links or notes that do not fit above.
        **Skip when:** nothing else.
    validations:
      required: false
