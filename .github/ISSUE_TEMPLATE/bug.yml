 name: Bug
description: Report a defect or regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Search existing issues first. One bug per issue.
        Agent guide: [agent/02-issue-guide.md](../../agent/02-issue-guide.md)
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What happened instead? Include errors if any.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment (optional)
      description: Instance URL, browser/OS, version if known.
    validations:
      required: false
