name: Bug
description: Reproducible defect or regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Guide: [agent/02-issue-guide.md](../../agent/02-issue-guide.md)

        ```
        ┌─────────────────────────────────────────────────────────┐
        │  REQUIRED — must fill before submit                     │
        │  RECOMMENDED EXTRAS — optional; fill when the note says │
        │    so. Leave blank if not applicable (do not write N/A).│
        │  Published headings are plain names (no "(optional)").  │
        └─────────────────────────────────────────────────────────┘
        ```

        Quality examples: [omp#5995](https://github.com/can1357/oh-my-pi/issues/5995), [omp#6011](https://github.com/can1357/oh-my-pi/issues/6011).

  - type: markdown
    attributes:
      value: |
        ---
        ## REQUIRED
        Complete every field in this section.

  - type: checkboxes
    id: bug-confirmation
    attributes:
      label: Confirmation
      options:
        - label: This is a reproducible bug or regression (not a feature idea or support question).
          required: true
        - label: I searched for similar issues (or explain under Additional context).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What breaks, and why it matters (unsafe, misleading, data risk, user impact). Prefer concrete symptoms.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Shortest exact steps. Include commands/payloads when relevant.
      placeholder: |
        1.
        2.
        3.
        4. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Authoritative outcome — what must happen, and what must not be treated as success.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What you observed (UI text, status, failure mode).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Always fill. Version + client/OS matter most.
      value: |
        - Instance URL (if relevant):
        - App / UF version (or commit):
        - Client (web / API / other):
        - Browser or OS:
        - Deploy (docker / bare / unknown):
        - Related services (Postgres/Redis/… if relevant):
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## RECOMMENDED EXTRAS (optional — use when applicable)

        | Field | Prefer to fill when… |
        | --- | --- |
        | **Error output** | There is a stack trace, tool exit text, console error, or server log |
        | **Impact** | Severity is not already clear from Description (who/how often/workarounds) |
        | **Evidence** | Perf numbers, N/N repro counts, waterfalls, screenshots of the failure |
        | **Related issues** | Easy to confuse with another issue, or “related but distinct from #N” |
        | **Suspected code paths** | You actually opened the code and can name files/symbols (no guessing essays) |
        | **Suggested regression coverage** | You can state a minimal test/assertion that would catch this |
        | **Additional context** | Redacted config, extra screenshots, notes that do not fit above |

        Skip a field by leaving it empty. Do **not** put the word “optional” into the Issue body headings.

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: "Prefer when: stack traces / tool failures / console or server logs exist. Skip when: pure UI state with no log line."
      render: shell
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: "Prefer when: Description understates severity (who is hurt, frequency, workarounds). Skip when: Description already covers impact."
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: "Prefer when: measurements, success/fail counts, or captures help (esp. perf / flaky repros). Skip when: a short deterministic repro is enough."
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: Related issues
      description: "Prefer when: near-duplicates exist or you need related-but-distinct. Skip when: none."
      placeholder: |
        Related but distinct: #…
        Not a duplicate of #… because …
    validations:
      required: false

  - type: textarea
    id: suspected
    attributes:
      label: Suspected code paths
      description: "Prefer when: you inspected code and can name files/symbols. Skip when: you would only be guessing."
    validations:
      required: false

  - type: textarea
    id: regression-tests
    attributes:
      label: Suggested regression coverage
      description: "Prefer when: you can propose a minimal test or assertion. Skip when: only manual repro for now."
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Prefer when: screenshots, redacted config, or notes that do not fit above. Never paste secrets. Skip when: nothing else."
    validations:
      required: false
