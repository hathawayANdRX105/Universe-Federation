name: Bug
description: Report a reproducible defect or regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Read [agent/02-issue-guide.md](../../agent/02-issue-guide.md) and [agent/01-dev-workflow.md](../../agent/01-dev-workflow.md).

        **Issues for actionable bugs (and maintainer work).** Feature ideas → use the Feature template. Internal refactor/CI/docs → Task template. Questions → Discussions or chat (not Issues).

        Keep it short and factual: what you did, what happened, what you expected. Do **not** paste root-cause essays, implementation plans, or AI diagnosis dumps unless a maintainer asks.

  - type: checkboxes
    id: bug-confirmation
    attributes:
      label: Is this a reproducible bug?
      description: Feature requests and open-ended ideas belong in the Feature template (or discussion), not here.
      options:
        - label: I confirm this is a reproducible bug or regression, not a feature request or general question.
          required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What is happening now? Describe what you observed, not a guessed cause.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Shortest exact steps (or commands) that show the problem. If you cannot reproduce yet, discuss first instead of opening a vague bug.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How does this affect you or your instance? (optional but helpful)
    validations:
      required: false

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Logs, stack traces, or console errors if any.
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill what you know. Version / OS or browser help a lot.
      value: |
        - Instance URL (if relevant):
        - Universe Federation / app version:
        - Client (web / other):
        - Browser or OS:
        - Deploy method (docker / bare / unknown):
    validations:
      required: false
